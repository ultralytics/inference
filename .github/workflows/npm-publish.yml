# Publish the browser/WebGPU package to npm https://www.npmjs.com/package/ultralytics-inference
# Mirrors publish.yml (crates.io): on push to main, if the version in Cargo.toml
# is not already on npm, build the wasm + TypeScript and publish it. So a single
# version bump in Cargo.toml releases both the crate and the npm package.

name: Publish to npm

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        description: Publish to npm
        default: false

jobs:
  check:
    if: github.repository == 'ultralytics/inference'
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.check_version.outputs.publish }}
      version: ${{ steps.check_version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - id: check_version
        # Single source of truth: the version in Cargo.toml. Publish only if that
        # exact version is not already on the npm registry.
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@ultralytics/yolo@$VERSION" version >/dev/null 2>&1; then
            echo "@ultralytics/yolo@$VERSION already on npm; skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "@ultralytics/yolo@$VERSION is new, will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.publish == 'true' && (github.event_name == 'push' || inputs.publish == true)
    runs-on: ubuntu-latest
    environment:
      name: Release - npm
      url: https://www.npmjs.com/package/@ultralytics/yolo
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: wasm

      - name: Install wasm-pack
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: wasm-pack

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync package version from Cargo.toml
        working-directory: web
        run: npm version "${{ needs.check.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build package
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        working-directory: web
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GITHUB_ACTIONS_TOKEN }}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ultralytics YOLO · WebGPU (WASM) demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      label {
        display: block;
        margin: 0.5rem 0 0.2rem;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 0.4rem;
        box-sizing: border-box;
      }
      button {
        margin-top: 1rem;
        padding: 0.6rem 1.2rem;
        font-size: 1rem;
        cursor: pointer;
      }
      #status {
        margin-top: 1rem;
        white-space: pre-wrap;
        font-family: monospace;
      }
      canvas {
        margin-top: 1rem;
        max-width: 100%;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <h1>Ultralytics YOLO in the browser (WebGPU)</h1>
    <p>
      Runs an Ultralytics YOLO ONNX model entirely client-side on the GPU. Requires a WebGPU-capable browser
      (Chrome/Edge) served over <code>https</code> or <code>localhost</code>.
    </p>

    <label for="model">Model URL (.onnx, exported with Ultralytics metadata)</label>
    <input id="model" value="yolo11n.onnx" />

    <label for="image">Image URL</label>
    <input id="image" value="bus.jpg" />

    <button id="run">Load &amp; Predict</button>
    <div id="status"></div>
    <canvas id="out"></canvas>

    <script type="module">
      import { YOLO, annotate } from "../dist/index.js";

      const statusEl = document.getElementById("status");
      const canvas = document.getElementById("out");
      const log = (msg) => (statusEl.textContent += msg + "\n");

      let model = null;
      let loadedFor = null;

      document.getElementById("run").addEventListener("click", async () => {
        statusEl.textContent = "";
        const modelUrl = document.getElementById("model").value;
        const imageUrl = document.getElementById("image").value;
        try {
          if (loadedFor !== modelUrl) {
            log(`Loading ${modelUrl} (first load also fetches the ONNX Runtime wasm)...`);
            model = await YOLO.load(modelUrl);
            loadedFor = modelUrl;
            log(`Model ready. Task: ${model.task}`);
          }

          log("Running inference...");
          const t0 = performance.now();
          const results = await model.predict(imageUrl);
          const total = performance.now() - t0;
          const s = results.speed;
          log(`Total predict(): ${total.toFixed(1)} ms (includes image fetch + decode)`);
          log(
            `  preprocess: ${s.preprocess.toFixed(1)} ms | inference+sync: ${s.inference.toFixed(1)} ms | postprocess: ${s.postprocess.toFixed(1)} ms`,
          );
          log(`Detections: ${results.boxes.length}`);
          log(
            "Result summary: " +
              JSON.stringify({
                task: results.task,
                orig_width: results.orig_width,
                orig_height: results.orig_height,
                boxes: results.boxes.length,
                obb: results.obb.length,
                keypoints: results.keypoints.length,
                probs: results.probs ? results.probs.top1_name : null,
              }),
          );

          log("Drawing...");
          await annotate(canvas, imageUrl, results);
          log("Done.");
        } catch (e) {
          log("ERROR: " + (e && e.stack ? e.stack : e && e.message ? e.message : String(e)));
          console.error(e);
        }
      });
    </script>
  </body>
</html>
